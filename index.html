<!-- ══════════════ 온보딩: 최초 1회만 ══════════════ -->
<section class="screen" id="screen-onboard" hidden>
  <div class="onboard">
    <div class="onboard-hero">📚</div>
    <h1>도서관 탐험대</h1>
    <p class="onboard-sub">모험을 떠나기 전에 탐험대원 등록을 해주세요!</p>
    <form id="onboard-form" class="card">
      <label>이름
        <input name="name" required maxlength="10" placeholder="김도서" autocomplete="off">
      </label>
      <label>학년
        <select name="grade" id="sel-grade"></select>
      </label>
      <label>반
        <select name="classNo" id="sel-class"></select>
      </label>
      <button class="btn btn-primary btn-lg" type="submit">탐험 시작하기 🚀</button>
    </form>
  </div>
</section>

<!-- ══════════════ 홈 대시보드 ══════════════ -->
<section class="screen" id="screen-home" hidden>
  <header class="topbar">
    <div>
      <p class="topbar-hello" id="home-hello">안녕!</p>
      <h1 class="topbar-title">도서관 탐험대</h1>
    </div>
  </header>

  <main class="scroll">
    <!-- 진행률 -->
    <div class="card progress-card">
      <div class="progress-head">
        <span>도서관 탐험 진행률</span>
        <strong id="progress-pct">0%</strong>
      </div>
      <div class="bar"><div class="bar-fill" id="progress-bar"></div></div>
      <p class="progress-note" id="progress-note">5단계를 모두 완료하고 퀴즈에 도전하세요!</p>
    </div>

    <!-- 교육 메뉴 -->
    <h2 class="section-title">탐험 코스</h2>
    <div class="menu-grid" id="menu-grid"></div>

    <!-- 퀴즈 -->
    <button class="quiz-cta" id="btn-quiz-cta">
      <span class="quiz-cta-emoji">🏅</span>
      <span class="quiz-cta-text">
        <strong>도전! 도서관 퀴즈</strong>
        <small id="quiz-cta-sub">5문제 중 4문제를 맞히면 수료 배지!</small>
      </span>
      <span class="quiz-cta-arrow">›</span>
    </button>

    <!-- 반납 D-Day -->
    <h2 class="section-title">
      내가 빌린 책
      <button class="link-btn" id="btn-add-loan">+ 추가</button>
    </h2>
    <div id="loan-list"></div>

    <!-- 공지 -->
    <h2 class="section-title">도서관 소식</h2>
    <div id="notice-list"></div>

    <footer class="foot">
      <button class="link-btn" id="btn-admin">🔐 사서 선생님용</button>
    </footer>
  </main>
</section>

<!-- ══════════════ F-04 도서관 약속 (YES/NO) ══════════════ -->

  <nav class="stepnav">
    <button class="btn btn-no" id="btn-no">❌ NO</button>
    <button class="btn btn-yes" id="btn-yes">⭕ YES</button>
    <button class="btn btn-primary" id="btn-swipe-next" hidden>다음 카드 →</button>
  </nav>
</section>

<!-- ══════════════ F-06 퀴즈 ══════════════ -->

  <form class="modal-box" id="loan-form">
    <h2>빌린 책 추가</h2>
    <label>책 제목
      <input name="title" required maxlength="40" placeholder="마당을 나온 암탉" autocomplete="off">
    </label>
    <label>반납일
      <input name="dueDate" type="date" required>
    </label>
    <div class="modal-actions">
      <button class="btn" type="button" data-close>취소</button>
      <button class="btn btn-primary" type="submit">추가</button>

</div>
